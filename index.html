<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Quiz</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 { text-align: center; }

.question-box {
    padding: 20px;
    border-radius: 10px;
    background: #f5f7fb;
    margin-bottom: 20px;
    transition: 0.3s;
}

.correct { background: #c8f7c5; }
.wrong { background: #f7c5c5; }

button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover { background: #5a67d8; }

input[type="text"] {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">
<h1>Smart Quiz</h1>

<div id="quiz"></div>
<button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>
<button id="nextBtn" class="hidden" onclick="nextQuestion()">Next Question</button>

<div id="feedback"></div>
<div id="final"></div>
</div>

<script>
// QUESTION BANK (MORE DETAILED ANSWERS)
const questions = [
{
q:"Explain the function of red blood cells.",
keywords:["oxygen","transport"],
topic:"blood"
},
{
q:"Describe how enzymes speed up chemical reactions.",
keywords:["lower","activation energy"],
topic:"enzymes"
},
{
q:"Explain what happens during photosynthesis.",
keywords:["carbon dioxide","water","glucose","oxygen"],
topic:"photosynthesis"
},
{
q:"Describe the role of the heart.",
keywords:["pump","blood"],
topic:"organs"
},
{
q:"Explain what plasma does in blood.",
keywords:["transport","nutrients","waste"],
topic:"blood"
},
{
q:"Explain how to improve accuracy in an experiment.",
keywords:["repeat","average","measure"],
topic:"accuracy"
},
{
q:"What is standard form in maths?",
keywords:["10","power"],
topic:"standard form"
},
{
q:"Explain what a metaphor is in writing.",
keywords:["comparison","not like"],
topic:"writing"
},
{
q:"Explain the function of white blood cells.",
keywords:["fight","infection"],
topic:"blood"
},
{
q:"Describe the function of platelets.",
keywords:["clot","bleeding"],
topic:"blood"
}
];

// VARIABLES
let quizSet = [];
let currentIndex = 0;
let score = 0;
let weakTopics = {};

// START
function startQuiz() {
    quizSet = questions.sort(() => 0.5 - Math.random()).slice(0, 10);
    currentIndex = 0;
    score = 0;
    weakTopics = {};
    showQuestion();
}

function showQuestion() {
    const q = quizSet[currentIndex];

    document.getElementById("quiz").innerHTML = `
        <div class="question-box" id="box">
            <p><strong>Question ${currentIndex + 1}/10:</strong> ${q.q}</p>
            <textarea id="answer" rows="4" placeholder="Write a full answer..."></textarea>
        </div>
    `;

    document.getElementById("feedback").innerHTML = "";
    document.getElementById("submitBtn").classList.remove("hidden");
    document.getElementById("nextBtn").classList.add("hidden");
}

function checkKeywords(answer, keywords) {
    let matches = 0;

    keywords.forEach(k => {
        if (answer.includes(k)) matches++;
    });

    // require at least half the keywords
    return matches >= Math.ceil(keywords.length / 2);
}

function submitAnswer() {
    const q = quizSet[currentIndex];
    const userAnswer = document.getElementById("answer").value.toLowerCase();
    const box = document.getElementById("box");

    let correct = checkKeywords(userAnswer, q.keywords);

    if (correct) {
        box.classList.add("correct");
        score++;
        document.getElementById("feedback").innerHTML = "✅ Good answer!";
    } else {
        box.classList.add("wrong");

        document.getElementById("feedback").innerHTML =
            `❌ You needed to include ideas like: ${q.keywords.join(", ")}`;

        weakTopics[q.topic] = (weakTopics[q.topic] || 0) + 1;
    }

    document.getElementById("submitBtn").classList.add("hidden");
    document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < 10) {
        showQuestion();
    } else {
        showResults();
    }
}

function getGrade(score) {
    if (score >= 9) return "A";
    if (score >= 7) return "B";
    if (score >= 5) return "C";
    if (score >= 3) return "D";
    return "F";
}

function showResults() {
    const grade = getGrade(score);

    let advice = "Revise: ";
    let topics = Object.keys(weakTopics);

    if (topics.length === 0) {
        advice = "Excellent understanding 🎉";
    } else {
        advice += topics.join(", ");
    }

    document.getElementById("quiz").innerHTML = "";
    document.getElementById("submitBtn").classList.add("hidden");
    document.getElementById("nextBtn").classList.add("hidden");

    document.getElementById("final").innerHTML = `
        <h2>Score: ${score}/10</h2>
        <h3>Grade: ${grade}</h3>
        <p>${advice}</p>
        <button onclick="startQuiz()">Retry</button>
    `;
}

startQuiz();
</script>

</body>
</html>
